<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Plan Generator</title>
  <style>
    :root {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: #17202a;
      background: #f4f7f9;
      --accent: #176b87;
      --accent-dark: #0f4f63;
      --line: #d7dde3;
      --muted: #617181;
      --panel: #ffffff;
      --danger-bg: #fff4f0;
      --danger: #9a3412;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    header { padding: 24px 32px 16px; background: #fff; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: var(--muted); }
    main { padding: 24px 32px 44px; display: grid; gap: 18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
    textarea { width: 100%; min-height: 300px; resize: vertical; border: 1px solid var(--line); border-radius: 8px; padding: 14px; font: 13px/1.45 Consolas, Menlo, monospace; color: #17202a; background: #fbfcfd; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    button, .button { border: 0; border-radius: 7px; padding: 10px 14px; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 14px; }
    button:hover, .button:hover { background: var(--accent-dark); }
    .secondary { background: #e9eef2; color: #1c2b38; }
    .secondary:hover { background: #dce4ea; }
    .error { display: none; background: var(--danger-bg); color: var(--danger); border: 1px solid #ffd6c8; border-radius: 8px; padding: 12px 14px; }
    .meta { color: var(--muted); font-size: 13px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    table { width: 100%; min-width: 1180px; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; font-size: 13px; }
    th { position: sticky; top: 0; background: #5f9f47; color: #fff; font-size: 12px; }
    tr:nth-child(even) td { background: #fbfcfd; }
    td.selected { background: #ffe866 !important; font-weight: 700; }
    tr.total td { background: #e8e8e8 !important; font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <h1>Media Plan Generator</h1>
    <p>Paste a client brief JSON to generate an English media plan table and download CSV.</p>
  </header>
  <main>
    <section class="panel">
      <label for="clientBrief">Client Brief JSON</label>
      <textarea id="clientBrief" spellcheck="false"></textarea>
      <div class="actions">
        <button id="generateButton" type="button">Generate Media Plan</button>
        <button id="downloadButton" type="button">Download CSV</button>
        <button id="sampleButton" class="secondary" type="button">Reload Sample</button>
        <span id="rowCount" class="meta"></span>
      </div>
    </section>
    <div id="error" class="error"></div>
    <section class="table-wrap">
      <table id="planTable"></table>
    </section>
  </main>

  <script>
    const HEADERS = [
      "Channel",
      "Ad Platform",
      "Budget Allocation (RMB)",
      "Budget %",
      "Estimated Clicks",
      "Estimated Impressions",
      "Estimated CTR",
      "Estimated Avg. CPC (RMB)",
      "Estimated Avg. CPR (RMB)",
      "Estimated Registrations"
    ];

    const CHANNEL_GROUPS = [
      {
        channel: "Search Advertising",
        platforms: ["Google Keyword Search", "Yandex", "Google PMax"]
      },
      {
        channel: "Display Ad Network",
        platforms: ["Google Remarketing"]
      },
      {
        channel: "Social Media Advertising",
        platforms: [
          "Facebook & IG Website Traffic",
          "Facebook & IG Lead Ads",
          "TikTok",
          "LinkedIn Lead Ads"
        ]
      }
    ];

    const DEFAULT_BENCHMARKS = {
      "Google Keyword Search": { cpc: 8, ctr: 0.02, cpr: 120 },
      "Yandex": { cpc: 6, ctr: 0.02, cpr: 120 },
      "Google PMax": { cpc: 3, ctr: 0.03, cpr: 110 },
      "Google Remarketing": { cpc: 2, ctr: 0.012, cpr: 120 },
      "Facebook & IG Website Traffic": { cpc: 4, ctr: 0.006, cpr: 200 },
      "Facebook & IG Lead Ads": { cpc: 4, ctr: 0.006, cpr: 100 },
      "TikTok": { cpc: 3, ctr: 0.006, cpr: 150 },
      "LinkedIn Lead Ads": { cpc: 28, ctr: 0.006, cpr: 800 }
    };

    const ALL_PLATFORMS = CHANNEL_GROUPS.flatMap((group) => group.platforms);

    const DEFAULT_BRIEF = {
      client_name: "Demo Client",
      market: "China Export",
      total_budget_rmb: 300000,
      selected_platforms: [
        "Google Keyword Search",
        "Google PMax",
        "Google Remarketing",
        "Facebook & IG Website Traffic",
        "Facebook & IG Lead Ads",
        "TikTok"
      ],
      platform_budget_percentages: {
        "Google Keyword Search": 0.25,
        "Yandex": 0,
        "Google PMax": 0.2,
        "Google Remarketing": 0.1,
        "Facebook & IG Website Traffic": 0.15,
        "Facebook & IG Lead Ads": 0.2,
        "TikTok": 0.1,
        "LinkedIn Lead Ads": 0
      },
      benchmarks: {
        "Google Keyword Search": {
          cpc: 8,
          ctr: "2%",
          cpr: 120
        }
      }
    };

    const briefInput = document.getElementById("clientBrief");
    const errorBox = document.getElementById("error");
    const table = document.getElementById("planTable");
    const rowCount = document.getElementById("rowCount");
    let currentRows = [];

    function parseNumber(value) {
      if (typeof value === "number") return value;
      const cleaned = String(value).replace(/,/g, "").replace(/RMB/g, "").replace(/¥/g, "").trim();
      if (!cleaned) throw new Error("Expected numeric value, got blank");
      return Number(cleaned);
    }

    function parsePercentage(value) {
      if (typeof value === "number") return value > 1 ? value / 100 : value;
      const text = String(value).trim();
      if (text.endsWith("%")) return Number(text.slice(0, -1).trim()) / 100;
      const numeric = Number(text);
      return numeric > 1 ? numeric / 100 : numeric;
    }

    function parseMetric(value, metric) {
      return metric === "ctr" ? parsePercentage(value) : parseNumber(value);
    }

    function mergeBenchmarks(customBenchmarks = {}) {
      const benchmarks = JSON.parse(JSON.stringify(DEFAULT_BENCHMARKS));
      for (const [platform, values] of Object.entries(customBenchmarks)) {
        if (!benchmarks[platform]) throw new Error(`Unknown benchmark platform: ${platform}`);
        for (const metric of ["cpc", "ctr", "cpr"]) {
          if (metric in values) benchmarks[platform][metric] = parseMetric(values[metric], metric);
        }
      }
      return benchmarks;
    }

    function validateBrief(brief) {
      if (!("total_budget_rmb" in brief)) throw new Error("Missing required field: total_budget_rmb");
      if (parseNumber(brief.total_budget_rmb) <= 0) throw new Error("total_budget_rmb must be greater than 0");

      const selectedPlatforms = brief.selected_platforms || ALL_PLATFORMS;
      const unknownSelected = selectedPlatforms.filter((platform) => !ALL_PLATFORMS.includes(platform));
      if (unknownSelected.length) throw new Error(`Unknown selected platform(s): ${unknownSelected.join(", ")}`);

      for (const field of ["platform_budgets_rmb", "platform_budget_percentages"]) {
        const values = brief[field] || {};
        const unknown = Object.keys(values).filter((platform) => !ALL_PLATFORMS.includes(platform));
        if (unknown.length) throw new Error(`Unknown ${field} key(s): ${unknown.join(", ")}`);
      }
    }

    function allocateBudgets(brief, totalBudget, selectedPlatforms) {
      const budgets = Object.fromEntries(ALL_PLATFORMS.map((platform) => [platform, 0]));
      if (brief.platform_budgets_rmb) {
        for (const [platform, amount] of Object.entries(brief.platform_budgets_rmb)) {
          budgets[platform] = parseNumber(amount);
        }
        return budgets;
      }
      if (brief.platform_budget_percentages) {
        for (const [platform, percentage] of Object.entries(brief.platform_budget_percentages)) {
          budgets[platform] = totalBudget * parsePercentage(percentage);
        }
        return budgets;
      }
      const evenBudget = totalBudget / selectedPlatforms.length;
      for (const platform of selectedPlatforms) budgets[platform] = evenBudget;
      return budgets;
    }

    function generateRows(brief) {
      validateBrief(brief);
      const totalBudget = parseNumber(brief.total_budget_rmb);
      const selectedPlatforms = new Set(brief.selected_platforms || ALL_PLATFORMS);
      const benchmarks = mergeBenchmarks(brief.benchmarks || {});
      const budgets = allocateBudgets(brief, totalBudget, selectedPlatforms);
      const rows = [];

      for (const group of CHANNEL_GROUPS) {
        for (const platform of group.platforms) {
          const budget = budgets[platform] || 0;
          const benchmark = benchmarks[platform];
          const clicks = budget / benchmark.cpc;
          const impressions = clicks / benchmark.ctr;
          const registrations = budget / benchmark.cpr;
          rows.push({
            selected: selectedPlatforms.has(platform),
            cells: [
              group.channel,
              platform,
              budget,
              budget / totalBudget,
              clicks,
              impressions,
              benchmark.ctr,
              benchmark.cpc,
              benchmark.cpr,
              registrations
            ]
          });
        }
      }

      const totals = calculateTotals(rows);
      rows.push({ total: true, selected: false, cells: totals });
      return rows;
    }

    function calculateTotals(rows) {
      const totalBudget = rows.reduce((sum, row) => sum + row.cells[2], 0);
      const totalClicks = rows.reduce((sum, row) => sum + row.cells[4], 0);
      const totalImpressions = rows.reduce((sum, row) => sum + row.cells[5], 0);
      const totalRegistrations = rows.reduce((sum, row) => sum + row.cells[9], 0);
      return [
        "Total",
        "",
        totalBudget,
        1,
        totalClicks,
        totalImpressions,
        totalClicks / totalImpressions,
        totalBudget / totalClicks,
        totalBudget / totalRegistrations,
        totalRegistrations
      ];
    }

    function renderTable(rows) {
      const headerHtml = `<thead><tr>${HEADERS.map((header) => `<th>${escapeHtml(header)}</th>`).join("")}</tr></thead>`;
      const bodyHtml = `<tbody>${rows.map(renderRow).join("")}</tbody>`;
      table.innerHTML = headerHtml + bodyHtml;
      rowCount.textContent = `Generated ${rows.length - 1} platform rows + Total`;
    }

    function renderRow(row) {
      const className = row.total ? " class=\"total\"" : "";
      return `<tr${className}>${row.cells.map((cell, index) => {
        const selectedClass = row.selected && index === 1 ? " class=\"selected\"" : "";
        return `<td${selectedClass}>${escapeHtml(formatCell(cell, index))}</td>`;
      }).join("")}</tr>`;
    }

    function formatCell(value, index) {
      if (index === 2) return formatCurrency(value);
      if (index === 3 || index === 6) return formatPercent(value);
      if (index === 4 || index === 5 || index === 9) return formatInteger(value);
      if (index === 7 || index === 8) return formatCurrency(value, 2);
      return value;
    }

    function formatCurrency(value, decimals = 0) {
      return `RMB ${Number(value).toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      })}`;
    }

    function formatPercent(value) {
      return `${(Number(value) * 100).toFixed(2)}%`;
    }

    function formatInteger(value) {
      return Number(value).toLocaleString("en-US", { maximumFractionDigits: 0 });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[char]));
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function clearError() {
      errorBox.textContent = "";
      errorBox.style.display = "none";
    }

    function generate() {
      clearError();
      try {
        const brief = JSON.parse(briefInput.value);
        currentRows = generateRows(brief);
        renderTable(currentRows);
      } catch (error) {
        showError(`Cannot generate media plan: ${error.message}`);
      }
    }

    function downloadCsv() {
      if (!currentRows.length) generate();
      if (!currentRows.length) return;
      const csvRows = [
        HEADERS,
        ...currentRows.map((row) => row.cells.map((cell, index) => formatCell(cell, index)))
      ];
      const lines = csvRows.map((row) => row.map(csvCell).join(","));
      const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "media_plan.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value).replace(/"/g, '""');
      return `"${text}"`;
    }

    function loadSample() {
      briefInput.value = JSON.stringify(DEFAULT_BRIEF, null, 2);
      generate();
    }

    document.getElementById("generateButton").addEventListener("click", generate);
    document.getElementById("downloadButton").addEventListener("click", downloadCsv);
    document.getElementById("sampleButton").addEventListener("click", loadSample);
    loadSample();
  </script>
</body>
</html>
